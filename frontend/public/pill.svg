<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="left-half">
      <rect x="0" y="0" width="32" height="64"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="32" y="0" width="32" height="64"/>
    </clipPath>
  </defs>
  <!-- Left half of pill (dark indigo) -->
  <rect x="6" y="18" width="52" height="28" rx="14" ry="14"
        fill="#4f46e5" clip-path="url(#left-half)"/>
  <!-- Right half of pill (light indigo) -->
  <rect x="6" y="18" width="52" height="28" rx="14" ry="14"
        fill="#a5b4fc" clip-path="url(#right-half)"/>
  <!-- Center divider line -->
  <rect x="30" y="18" width="4" height="28" fill="white" opacity="0.6"/>
</svg>
